{% extends "base.html" %}
{% block title %}Set new password — Licorice Locker{% endblock %}
{% block content %}
<section class="panel narrow forgot-password-page">
  <h1>Choose a new password</h1>
  <p class="muted">Use at least 8 characters. After saving, use Listening Room sign in in the footer — you will set up two-factor authentication again.</p>
  <form method="post" class="form-stack" action="{{ url_for('reset_password', token=token) }}">
    <label>New password
      <input type="password" name="password" required minlength="8" autocomplete="new-password" placeholder="••••••••">
    </label>
    <label>Confirm password
      <input type="password" name="password_confirm" required minlength="8" autocomplete="new-password" placeholder="••••••••">
    </label>
    <button type="submit" class="btn primary">Update password</button>
  </form>
</section>
{% endblock %}
