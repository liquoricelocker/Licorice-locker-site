{% extends "base.html" %}
{% block title %}Forgot password — Licorice Locker{% endblock %}
{% block content %}
<section class="panel narrow forgot-password-page">
  <h1>Reset your password</h1>
  <p class="muted">Enter the email address on your Listening Room account. If it matches, we will send a secure link that expires in one hour.</p>
  <form method="post" class="form-stack" action="{{ url_for('forgot_password') }}">
    <label>Email
      <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
    </label>
    <button type="submit" class="btn primary">Send reset link</button>
  </form>
  <p class="muted small"><a href="{{ url_for('shop') }}">← Back to shop</a></p>
</section>
{% endblock %}
